<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSD Suppliers | Premium Game Top-Up Store</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: rgba(15, 23, 42, 0.75);
            --accent-cyan: #38bdf8;
            --accent-amber: #f59e0b;
            --accent-green: #22c55e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: rgba(56, 189, 248, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Canvas Background */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Layout Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* Header / Navbar */
        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--accent-cyan);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.5);
        }

        .logo span {
            color: var(--accent-amber);
        }

        .contact-btn {
            background: linear-gradient(135deg, var(--accent-amber), #d97706);
            color: #000;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 0 40px 0;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Products Section */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin: 40px 0 20px 0;
            color: var(--accent-amber);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }

        /* Cyberpunk Card Component */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.25);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card-header i {
            font-size: 1.8rem;
            color: var(--accent-cyan);
        }

        .card-header h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #fff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group select, 
        .form-group input {
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s ease;
        }

        .form-group select:focus, 
        .form-group input:focus {
            border-color: var(--accent-cyan);
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .buy-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <!-- Particle Background -->
    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">GSD <span>SUPPLIERS</span></div>
            <a href="https://wa.me/9779743712703" target="_blank" class="contact-btn">
                <i class="fa-brands fa-whatsapp"></i> Direct Help
            </a>
        </header>

        <!-- Hero -->
        <section class="hero">
            <h1>INSTANT IN-GAME TOP-UPS</h1>
            <p>Fast, reliable, and automated delivery for Free Fire, PUBG Mobile, and more.</p>
        </section>

        <!-- Catalog -->
        <h2 class="section-title"><i class="fa-solid fa-gamepad"></i> Choose Your Game</h2>
        
        <div class="products-grid">

            <!-- Free Fire Box -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-fire-flame-curated" style="color: #ef4444;"></i>
                    <h3>Free Fire Diamonds</h3>
                </div>
                <div class="form-group">
                    <label>Select Package</label>
                    <select id="ff-package">
                        <option value="90">110 Diamonds - NPR 90</option>
                        <option value="260">340 Diamonds - NPR 260</option>
                        <option value="450">570 Diamonds - NPR 450</option>
                        <option value="890">1140 Diamonds - NPR 890</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Player UID</label>
                    <input type="text" id="ff-uid" placeholder="e.g. 123456789">
                </div>
                <div class="form-group">
                    <label>Your Phone Number</label>
                    <input type="tel" id="ff-phone" placeholder="e.g. 98XXXXXXXX">
                </div>
                <button class="buy-btn" onclick="submitOrder('Free Fire', 'ff-package', 'ff-uid', 'ff-phone')">
                    <i class="fa-brands fa-whatsapp"></i> Buy via WhatsApp
                </button>
            </div>

            <!-- PUBG Mobile Box -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-crosshair" style="color: var(--accent-amber);"></i>
                    <h3>PUBG Mobile UC</h3>
                </div>
                <div class="form-group">
                    <label>Select Package</label>
                    <select id="pubg-package">
                        <option value="120">60 UC - NPR 120</option>
                        <option value="600">325 UC - NPR 600</option>
                        <option value="1200">660 UC - NPR 1200</option>
                        <option value="3200">1800 UC - NPR 3200</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Character ID (UID)</label>
                    <input type="text" id="pubg-uid" placeholder="e.g. 512345678">
                </div>
                <div class="form-group">
                    <label>Your Phone Number</label>
                    <input type="tel" id="pubg-phone" placeholder="e.g. 98XXXXXXXX">
                </div>
                <button class="buy-btn" onclick="submitOrder('PUBG Mobile', 'pubg-package', 'pubg-uid', 'pubg-phone')">
                    <i class="fa-brands fa-whatsapp"></i> Buy via WhatsApp
                </button>
            </div>

        </div>

        <footer>
            <p>&copy; 2026 GSD Suppliers. All rights reserved.</p>
        </footer>
    </div>

    <!-- Script Section -->
    <script>
        // 1. Particle Canvas Background Effect
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(56, 189, 248, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // 2. WhatsApp Order Submission Handler
        function submitOrder(gameName, packageId, uidId, phoneId) {
            const packageSelect = document.getElementById(packageId);
            const selectedOption = packageSelect.options[packageSelect.selectedIndex];
            const itemPackage = selectedOption.text;
            const price = selectedOption.value;

            const playerUID = document.getElementById(uidId).value.trim();
            const customerPhone = document.getElementById(phoneId).value.trim();

            if (!playerUID) {
                alert('Please enter your Player UID / User ID!');
                return;
            }

            if (!customerPhone) {
                alert('Please enter your Phone Number!');
                return;
            }

            // Target Admin WhatsApp Number
            const adminPhone = "9779743712703";

            // Structured Message
            const message = 
                `*NEW ORDER - GSD SUPPLIERS*\n` +
                `━━━━━━━━━━━━━━━━━━━━━━\n` +
                `🎮 *Game:* ${gameName}\n` +
                `📦 *Package:* ${itemPackage}\n` +
                `💰 *Amount:* NPR ${price}\n` +
                `🆔 *Player UID:* ${playerUID}\n` +
                `📱 *Customer Phone:* ${customerPhone}\n` +
                `━━━━━━━━━━━━━━━━━━━━━━\n` +
                `Please confirm my order and share the payment QR/details!`;

            const whatsappUrl = `https://wa.me/${adminPhone}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
