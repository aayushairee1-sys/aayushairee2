<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog & Store | GSD Suppliers</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: rgba(15, 23, 42, 0.75);
            --accent-cyan: #38bdf8;
            --accent-amber: #f59e0b;
            --accent-green: #22c55e;
            --accent-purple: #a855f7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: rgba(56, 189, 248, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* Navbar */
        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--accent-cyan);
            letter-spacing: 1px;
            text-decoration: none;
        }

        .logo span {
            color: var(--accent-amber);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-cyan);
        }

        /* Catalog Section Header */
        .page-title {
            text-align: center;
            margin: 40px 0 20px 0;
        }

        .page-title h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Category Filter Buttons */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .filter-btn {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-glow);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* Products Grid */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.25);
        }

        .badge {
            align-self: flex-start;
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-cyan);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            color: #fff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group select, .form-group input {
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            outline: none;
            font-size: 0.9rem;
        }

        .form-group select:focus, .form-group input:focus {
            border-color: var(--accent-cyan);
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s ease;
        }

        .buy-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <!-- Header -->
        <header>
            <a href="index.html" class="logo">GSD <span>SUPPLIERS</span></a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link active">Store Catalog</a>
            </nav>
        </header>

        <!-- Title -->
        <div class="page-title">
            <h1>ALL TOP-UP SERVICES</h1>
            <p style="color: var(--text-muted);">Select your package, enter your details, and place your order instantly.</p>
        </div>

        <!-- Filter Controls -->
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterCategory('all')">All Products</button>
            <button class="filter-btn" onclick="filterCategory('mobile-games')">Mobile Games</button>
            <button class="filter-btn" onclick="filterCategory('subscriptions')">Subscriptions</button>
        </div>

        <!-- Products Grid -->
        <div class="catalog-grid">

            <!-- Free Fire Card -->
            <div class="product-card" data-category="mobile-games">
                <div>
                    <span class="badge">Mobile Game</span>
                    <div class="card-title"><i class="fa-solid fa-fire-flame-curated" style="color: #ef4444;"></i> Free Fire</div>
                    <div class="form-group">
                        <label>Select Package</label>
                        <select id="ff-pkg">
                            <option value="90">110 Diamonds - NPR 90</option>
                            <option value="260">340 Diamonds - NPR 260</option>
                            <option value="450">570 Diamonds - NPR 450</option>
                            <option value="890">1140 Diamonds - NPR 890</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Player UID</label>
                        <input type="text" id="ff-uid" placeholder="e.g. 123456789">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="ff-phone" placeholder="e.g. 98XXXXXXXX">
                    </div>
                </div>
                <button class="buy-btn" onclick="orderNow('Free Fire', 'ff-pkg', 'ff-uid', 'ff-phone')">
                    <i class="fa-brands fa-whatsapp"></i> Order via WhatsApp
                </button>
            </div>

            <!-- PUBG Mobile Card -->
            <div class="product-card" data-category="mobile-games">
                <div>
                    <span class="badge">Mobile Game</span>
                    <div class="card-title"><i class="fa-solid fa-crosshair" style="color: var(--accent-amber);"></i> PUBG Mobile</div>
                    <div class="form-group">
                        <label>Select Package</label>
                        <select id="pubg-pkg">
                            <option value="120">60 UC - NPR 120</option>
                            <option value="600">325 UC - NPR 600</option>
                            <option value="1200">660 UC - NPR 1200</option>
                            <option value="3200">1800 UC - NPR 3200</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Character ID (UID)</label>
                        <input type="text" id="pubg-uid" placeholder="e.g. 512345678">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="pubg-phone" placeholder="e.g. 98XXXXXXXX">
                    </div>
                </div>
                <button class="buy-btn" onclick="orderNow('PUBG Mobile', 'pubg-pkg', 'pubg-uid', 'pubg-phone')">
                    <i class="fa-brands fa-whatsapp"></i> Order via WhatsApp
                </button>
            </div>

            <!-- Mobile Legends Card -->
            <div class="product-card" data-category="mobile-games">
                <div>
                    <span class="badge">Mobile Game</span>
                    <div class="card-title"><i class="fa-solid fa-shield-halved" style="color: var(--accent-cyan);"></i> Mobile Legends</div>
                    <div class="form-group">
                        <label>Select Package</label>
                        <select id="ml-pkg">
                            <option value="180">86 Diamonds - NPR 180</option>
                            <option value="350">172 Diamonds - NPR 350</option>
                            <option value="520">257 Diamonds - NPR 520</option>
                            <option value="1400">706 Diamonds - NPR 1400</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>User ID & Zone ID</label>
                        <input type="text" id="ml-uid" placeholder="e.g. 12345678 (1234)">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="ml-phone" placeholder="e.g. 98XXXXXXXX">
                    </div>
                </div>
                <button class="buy-btn" onclick="orderNow('Mobile Legends', 'ml-pkg', 'ml-uid', 'ml-phone')">
                    <i class="fa-brands fa-whatsapp"></i> Order via WhatsApp
                </button>
            </div>

            <!-- Netflix Subscription Card -->
            <div class="product-card" data-category="subscriptions">
                <div>
                    <span class="badge" style="color: var(--accent-purple); background: rgba(168, 85, 247, 0.15);">Subscription</span>
                    <div class="card-title"><i class="fa-solid fa-tv" style="color: #e50914;"></i> Netflix Screen</div>
                    <div class="form-group">
                        <label>Select Duration</label>
                        <select id="netflix-pkg">
                            <option value="350">1 Month Private Screen - NPR 350</option>
                            <option value="950">3 Months Private Screen - NPR 950</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Your Email / Name</label>
                        <input type="text" id="netflix-uid" placeholder="Your name or email">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="netflix-phone" placeholder="e.g. 98XXXXXXXX">
                    </div>
                </div>
                <button class="buy-btn" onclick="orderNow('Netflix', 'netflix-pkg', 'netflix-uid', 'netflix-phone')">
                    <i class="fa-brands fa-whatsapp"></i> Order via WhatsApp
                </button>
            </div>

        </div>

        <footer>
            <p>&copy; 2026 GSD Suppliers. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // Particle Background Logic
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(56, 189, 248, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Category Filter Function
        function filterCategory(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                if (category === 'all' || card.getAttribute('data-category') === category) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // WhatsApp Checkout Submission
        function orderNow(title, packageId, uidId, phoneId) {
            const select = document.getElementById(packageId);
            const packageText = select.options[select.selectedIndex].text;
            const price = select.value;
            const playerUID = document.getElementById(uidId).value.trim();
            const customerPhone = document.getElementById(phoneId).value.trim();

            if (!playerUID) {
                alert('Please enter your Player UID or ID details.');
                return;
            }
            if (!customerPhone) {
                alert('Please enter your Phone Number.');
                return;
            }

            const adminPhone = "9779743712703";
            const message = 
                `*NEW CATALOG ORDER - GSD SUPPLIERS*\n` +
                `━━━━━━━━━━━━━━━━━━━━━━\n` +
                `📦 *Item:* ${title}\n` +
                `🏷️ *Option:* ${packageText}\n` +
                `💰 *Price:* NPR ${price}\n` +
                `🆔 *Account/UID:* ${playerUID}\n` +
                `📱 *Customer Phone:* ${customerPhone}\n` +
                `━━━━━━━━━━━━━━━━━━━━━━\n` +
                `Please process my order!`;

            window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
