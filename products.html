<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSD TOPUP GHAR | All Products</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #060911;
            --card-bg: #0d1322;
            --accent-gold: #fbbf24;
            --accent-cyan: #38bdf8;
            --accent-green: #22c55e;
            --accent-pubg: #f97316;
            --accent-ml: #a855f7;
            --accent-netflix: #e50914;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glow-gold: rgba(251, 191, 36, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 25px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.7rem;
            font-weight: 900;
            color: var(--accent-gold);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .logo span { color: var(--accent-cyan); }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--accent-gold);
        }

        /* Controls Section */
        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .search-box {
            flex: 1;
            min-width: 260px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 16px 12px 42px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent-gold);
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-muted);
            padding: 10px 16px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            border-color: var(--accent-gold);
            color: #fff;
            background: rgba(251, 191, 36, 0.15);
        }

        /* Product Catalog Grid */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 10px 25px var(--glow-gold);
        }

        .product-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .badge-ff { background: rgba(56, 189, 248, 0.15); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); }
        .badge-pubg { background: rgba(249, 115, 22, 0.15); color: var(--accent-pubg); border: 1px solid var(--accent-pubg); }
        .badge-ml { background: rgba(168, 85, 247, 0.15); color: var(--accent-ml); border: 1px solid var(--accent-ml); }
        .badge-netflix { background: rgba(229, 9, 20, 0.15); color: var(--accent-netflix); border: 1px solid var(--accent-netflix); }

        .product-icon {
            font-size: 2.2rem;
            margin: 15px 0;
        }

        .product-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 8px;
        }

        .product-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .view-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-gold), #d97706);
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Order Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-body {
            background: #0d1322;
            border: 1px solid var(--accent-gold);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 460px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .close-modal {
            position: absolute;
            top: 18px; right: 18px;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-gold);
            font-size: 1.25rem;
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-control, .form-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 11px;
            border-radius: 8px;
            margin-bottom: 14px;
            outline: none;
            font-size: 0.9rem;
        }

        .form-select option {
            background: #0d1322;
            color: #fff;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent-gold);
        }

        .qr-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            margin-bottom: 15px;
        }

        .qr-img {
            width: 180px;
            height: auto;
            border-radius: 10px;
            margin: 10px 0;
            border: 2px solid var(--accent-gold);
        }

        .qr-warning {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--accent-red);
            color: #fca5a5;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 8px;
            line-height: 1.3;
        }

        .confirm-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .error-msg {
            color: var(--accent-red);
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <a href="index.html" class="logo">GSD <span>TOPUP GHAR</span></a>
            <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Back to Home</a>
        </header>

        <!-- Search & Filter Controls -->
        <div class="controls-bar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" oninput="filterProducts()" placeholder="Search game or package...">
            </div>
            <div class="filter-tabs">
                <button class="filter-btn active" onclick="setFilter('all', this)">All Products</button>
                <button class="filter-btn" onclick="setFilter('ff', this)">Free Fire</button>
                <button class="filter-btn" onclick="setFilter('pubg', this)">PUBG Mobile</button>
                <button class="filter-btn" onclick="setFilter('ml', this)">Mobile Legends</button>
                <button class="filter-btn" onclick="setFilter('netflix', this)">Netflix</button>
            </div>
        </div>

        <!-- Catalog Grid -->
        <div class="catalog-grid" id="catalogGrid"></div>
    </div>

    <!-- ORDER MODAL POPUP -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal-body">
            <i class="fa-solid fa-xmark close-modal" onclick="closeOrderModal()"></i>
            
            <div class="modal-title" id="modalProductTitle">Product Title</div>

            <!-- Package Dropdown -->
            <label class="form-label">Select Package *</label>
            <select class="form-select" id="packageSelect" onchange="updatePrice()"></select>

            <!-- Player UID -->
            <label class="form-label" id="accountLabel">Player UID / Account Details *</label>
            <input type="text" class="form-control" id="playerUIDInput" placeholder="Enter Player UID">

            <!-- Payment QR Section -->
            <div class="qr-section">
                <div style="font-size: 0.9rem; color: var(--accent-gold); font-weight: bold;">
                    Gauri Bhavani Kirana Pasal
                </div>
                <img src="qr.jpg" class="qr-img" alt="Payment QR Code">
                
                <div style="font-size: 1.1rem; font-weight: 800; color: #fff;" id="modalPrice">Amount: RS 0</div>

                <div class="qr-warning">
                    NOTE: Pasia Pathauda Affno Name Matra Lekhnu Hola Remarks Ma (natra kam hudaina)
                </div>
            </div>

            <!-- Transaction ID Input -->
            <label class="form-label">Transaction ID / Voucher No. *</label>
            <input type="text" class="form-control" id="txnCodeInput" placeholder="e.g. 1A2B3C4D or 98XXXXXXXX">
            
            <div class="error-msg" id="txnErrorMsg">This Transaction ID has already been used!</div>

            <!-- Action Button -->
            <button class="confirm-btn" onclick="processOrder()">
                <i class="fa-brands fa-whatsapp"></i> Send Order on WhatsApp
            </button>
        </div>
    </div>

    <script>
        // Master Products Catalog Data
        const productsData = [
            {
                id: 'ff-diamonds',
                category: 'ff',
                name: 'Free Fire Diamonds',
                subtitle: 'Direct UID Top-Up',
                icon: 'fa-solid fa-gem',
                iconColor: 'var(--accent-cyan)',
                badgeClass: 'badge-ff',
                badgeText: 'Free Fire',
                packages: [
                    { name: "25 Diamonds", price: 30 },
                    { name: "50 Diamonds", price: 50 },
                    { name: "100 Diamonds", price: 100 },
                    { name: "115 Diamonds", price: 105 },
                    { name: "240 Diamonds", price: 210 },
                    { name: "355 Diamonds", price: 315 },
                    { name: "480 Diamonds", price: 420 },
                    { name: "610 Diamonds", price: 525 },
                    { name: "725 Diamonds", price: 630 },
                    { name: "850 Diamonds", price: 735 },
                    { name: "965 Diamonds", price: 840 },
                    { name: "1090 Diamonds", price: 945 },
                    { name: "1240 Diamonds", price: 1050 },
                    { name: "1505 Diamonds", price: 1290 },
                    { name: "2090 Diamonds", price: 1780 },
                    { name: "2530 Diamonds", price: 2100 },
                    { name: "3010 Diamonds", price: 2520 },
                    { name: "5060 Diamonds", price: 4200 },
                    { name: "6300 Diamonds", price: 5200 },
                    { name: "10120 Diamonds", price: 8350 }
                ]
            },
            {
                id: 'ff-passes',
                category: 'ff',
                name: 'Free Fire Passes',
                subtitle: 'Weekly & Monthly Memberships',
                icon: 'fa-solid fa-id-card',
                iconColor: 'var(--accent-gold)',
                badgeClass: 'badge-ff',
                badgeText: 'Free Fire',
                packages: [
                    { name: "Weekly Lite (90💎)", price: 60 },
                    { name: "Weekly (445💎)", price: 210 },
                    { name: "Monthly (2500💎)", price: 1040 },
                    { name: "Level-Up Pass (1270💎)", price: 540 }
                ]
            },
            {
                id: 'pubg-uc',
                category: 'pubg',
                name: 'PUBG Mobile UC',
                subtitle: 'Unknown Cash Top-Up',
                icon: 'fa-solid fa-crosshair',
                iconColor: 'var(--accent-pubg)',
                badgeClass: 'badge-pubg',
                badgeText: 'PUBG Mobile',
                packages: [
                    { name: "60 UC", price: 160 },
                    { name: "120 UC", price: 320 },
                    { name: "240 UC", price: 640 },
                    { name: "325 UC", price: 800 },
                    { name: "660 UC", price: 1600 },
                    { name: "720 UC", price: 1760 },
                    { name: "1800 UC", price: 4000 },
                    { name: "3850 UC", price: 8000 },
                    { name: "8100 UC", price: 15467 },
                    { name: "16200 UC", price: 30933 }
                ]
            },
            {
                id: 'ml-2xbonus',
                category: 'ml',
                name: 'MLBB 2X Bonus Diamonds',
                subtitle: 'First Purchase Bonus Packs',
                icon: 'fa-solid fa-bolt',
                iconColor: 'var(--accent-ml)',
                badgeClass: 'badge-ml',
                badgeText: 'Mobile Legends',
                packages: [
                    { name: "50 + 5 Diamonds (2X Bonus)", price: 145 },
                    { name: "150 + 15 Diamonds (2X Bonus)", price: 430 },
                    { name: "250 + 25 Diamonds (2X Bonus)", price: 698 },
                    { name: "500 + 65 Diamonds (2X Bonus)", price: 1439 }
                ]
            },
            {
                id: 'ml-normal',
                category: 'ml',
                name: 'MLBB Normal Diamonds',
                subtitle: 'Standard Diamond Packages',
                icon: 'fa-solid fa-gem',
                iconColor: 'var(--accent-ml)',
                badgeClass: 'badge-ml',
                badgeText: 'Mobile Legends',
                packages: [
                    { name: "86 Diamonds", price: 236 },
                    { name: "172 Diamonds", price: 473 },
                    { name: "257 Diamonds", price: 644 },
                    { name: "706 Diamonds", price: 1772 },
                    { name: "2195 Diamonds", price: 5456 }
                ]
            },
            {
                id: 'ml-passes',
                category: 'ml',
                name: 'MLBB Weekly & Twilight Pass',
                subtitle: 'Special In-Game Subscriptions',
                icon: 'fa-solid fa-ticket',
                iconColor: 'var(--accent-gold)',
                badgeClass: 'badge-ml',
                badgeText: 'Mobile Legends',
                packages: [
                    { name: "Weekly Pass", price: 279 },
                    { name: "Twilight Pass", price: 1504 }
                ]
            },
            {
                id: 'netflix-sub',
                category: 'netflix',
                name: 'Netflix Premium',
                subtitle: '4K Ultra HD Shared Screen',
                icon: 'fa-solid fa-tv',
                iconColor: 'var(--accent-netflix)',
                badgeClass: 'badge-netflix',
                badgeText: 'Netflix',
                packages: [
                    { name: "1 Month Screen", price: 360 },
                    { name: "3 Month Screen", price: 970 }
                ]
            }
        ];

        let currentCategory = 'all';
        let activeProduct = null;

        // Render Catalog Cards
        function renderCatalog() {
            const container = document.getElementById('catalogGrid');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';

            productsData.forEach(product => {
                const matchesCategory = (currentCategory === 'all' || product.category === currentCategory);
                const matchesSearch = product.name.toLowerCase().includes(searchQuery) || product.subtitle.toLowerCase().includes(searchQuery);

                if (matchesCategory && matchesSearch) {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <span class="product-badge ${product.badgeClass}">${product.badgeText}</span>
                        <div class="product-icon"><i class="${product.icon}" style="color:${product.iconColor};"></i></div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-subtitle">${product.subtitle}</div>
                        <button class="view-btn" onclick="openOrderModal('${product.id}')">View Rates & Buy</button>
                    `;
                    container.appendChild(card);
                }
            });
        }

        // Filter Handlers
        function setFilter(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCatalog();
        }

        function filterProducts() {
            renderCatalog();
        }

        // Modal Logic
        function openOrderModal(productId) {
            activeProduct = productsData.find(p => p.id === productId);
            if (!activeProduct) return;

            document.getElementById('modalProductTitle').innerText = activeProduct.name;
            
            // Build Dropdown Options
            const select = document.getElementById('packageSelect');
            select.innerHTML = '';
            activeProduct.packages.forEach((pkg, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.innerText = `${pkg.name} - RS ${pkg.price.toLocaleString()}`;
                select.appendChild(opt);
            });

            // Set Form Labels & Inputs according to product
            const uidInput = document.getElementById('playerUIDInput');
            const uidLabel = document.getElementById('accountLabel');

            if (activeProduct.category === 'ml') {
                uidLabel.innerText = "User ID & Zone ID *";
                uidInput.placeholder = "e.g. 12345678 (1234)";
            } else if (activeProduct.category === 'netflix') {
                uidLabel.innerText = "Name / Phone Number *";
                uidInput.placeholder = "Enter your Name or Contact Phone";
            } else {
                uidLabel.innerText = "Player UID / Character ID *";
                uidInput.placeholder = "Enter Player UID";
            }

            uidInput.value = '';
            document.getElementById('txnCodeInput').value = '';
            document.getElementById('txnErrorMsg').style.display = 'none';

            updatePrice();
            document.getElementById('orderModal').style.display = 'flex';
        }

        function updatePrice() {
            const select = document.getElementById('packageSelect');
            const selectedPkg = activeProduct.packages[select.value];
            document.getElementById('modalPrice').innerText = `Amount: RS ${selectedPkg.price.toLocaleString()}`;
        }

        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        // Duplicate Check Storage
        function getSavedTxnCodes() {
            return JSON.parse(localStorage.getItem('gsd_used_txn') || '[]');
        }

        // Process WhatsApp Order
        function processOrder() {
            const select = document.getElementById('packageSelect');
            const selectedPkg = activeProduct.packages[select.value];

            const uid = document.getElementById('playerUIDInput').value.trim();
            const txnCode = document.getElementById('txnCodeInput').value.trim().toUpperCase();
            const errorElement = document.getElementById('txnErrorMsg');

            if (!uid) {
                alert("Please fill in your Player UID or Account Details!");
                return;
            }

            if (!txnCode) {
                alert("Please enter the Transaction ID / Voucher Code!");
                return;
            }

            // Verify unique transaction code
            let savedCodes = getSavedTxnCodes();
            if (savedCodes.includes(txnCode)) {
                errorElement.innerText = "This Transaction ID has already been used!";
                errorElement.style.display = "block";
                return;
            }

            // Save new transaction code locally
            savedCodes.push(txnCode);
            localStorage.setItem('gsd_used_txn', JSON.stringify(savedCodes));

            const adminPhone = "9779743712703";

            const message = 
                `*NEW ORDER - GSD TOPUP GHAR*\n` +
                `━━━━━━━━━━━━━━━━━━━━━━\n` +
                `🎮 *Item:* ${activeProduct.name}\n` +
                `📦 *Package:* ${selectedPkg.name}\n` +
                `💰 *Amount:* RS ${selectedPkg.price.toLocaleString()}\n` +
                `🆔 *Account/UID:* ${uid}\n` +
                `🧾 *Transaction ID:* ${txnCode}\n` +
                `━━━━━━━━━━━━━━━━━━━━━━\n` +
                `Remarks verified with my name. Please complete my order!`;

            const whatsappUrl = `https://wa.me/${adminPhone}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            closeOrderModal();
        }

        // Initial Load
        renderCatalog();
    </script>
</body>
</html>
